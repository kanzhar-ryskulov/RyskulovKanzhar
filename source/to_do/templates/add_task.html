<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <title>Title</title>
</head>
<body>
<div class="container">
        <h1>Добавление новой задачи</h1>
    <form id="task_form" action="" method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="title">Заголовок задания</label>
            <input class="form-control" id="title" name="title" placeholder="Заголовок">
        </div>
        <div class="mb-3">
            <label class="form-label" for="description">Описание</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label" for="status">Статус</label>
            <select name="status" id="status">
                <option value="NEW">Новая</option>
                <option value="IN_PROGRESS">В процессе</option>
                <option value="DONE">Сделано</option>
            </select>
        </div>
        <div>
            <label class="form-label" for="date">Дата</label>
            <input class="form-control" id="date" type="date" name="date" placeholder="YYYY-MM-DD">
        </div>

        <div class="card-footer text-end py-3">
            <button type="submit" form="task_form" class="btn btn-sm btn-primary">Сохранить</button>
        </div>
    </form>

</div>

<script crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
