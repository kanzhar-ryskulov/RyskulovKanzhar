<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <title>Title</title>
</head>
<body>
<div class="container">
    <h1>All task here</h1>
<a href="/task/add/">Новая задача</a>
<div >
    {%for t in task%}
    <hr>
    <p>Заголовок: {{ t.title }}</p>
    <p>Основная: {{ t.description }}</p>
    <p>Статус: {{ t.status }}</p>
    <p>Дата: {{ t.date }}</p>
    <a href="/task/{{ t.id }}/" class="card-link mt-auto ms-auto">Подробнее</a>
    <hr>
    {% endfor %}

</div>
</div>

<script crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
