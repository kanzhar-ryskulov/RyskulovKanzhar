<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">

    <title>Title</title>
</head>
<body>
<div class="card text-center">
    <div class="card-body">
        <h1>Детальное описание задачи</h1>
    </div>
</div>
<div class="card ">
    <div class="card-body">
        <a class="border text-decoration-none"  href="/">Главная страница</a>
    </div>
</div>
<div class="container">
    <div class="card my-5">
        <div class="card-header fs-4 text-center"> {{ task.title }}</div>
        <div class="card-body">
            <figure>
                <blockquote class="blockquote">
                    <p>Детальное описание:</p>
                    <p>{{ task.detail_description|linebreaks }}</p>
                </blockquote>
                <figcaption class="blockquote-footer mt-3">
                    <p>Статус : {{ task.status }}</p>
                </figcaption>
            </figure>

        </div>
    </div>
</div>
<script crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
